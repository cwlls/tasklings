<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tasklings" />
  <meta name="theme-color" content="#4A90D9" />

  <title>{% block title %}Tasklings{% endblock %}</title>

  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />

  {% block extra_head %}{% endblock %}
</head>
<body>
  <main>
    {% block content %}{% endblock %}
  </main>

  {% include "components/_nav.html" %}

  <div id="toast-container" role="region" aria-live="polite" aria-label="Notifications"></div>

  {# HTMX -- loaded from CDN #}
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
